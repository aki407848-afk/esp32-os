name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install PlatformIO
        run: pip install platformio
        
      - name: Build Firmware
        run: pio run
        
      - name: Pack Flash Files
        run: |
          mkdir flash-package
          cp .pio/build/esp32-s3-devkitc-1/bootloader.bin flash-package/
          cp .pio/build/esp32-s3-devkitc-1/partitions.bin flash-package/
          cp .pio/build/esp32-s3-devkitc-1/firmware.bin flash-package/
          cd flash-package && zip -r ../esp32-os-flash.zip .
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-os-flash-package
          path: esp32-os-flash.zip
